<!-- login .html  -->
{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card" style="padding: 2.5rem;">
        <h2 class="text-center mb-6" style="font-size: 2rem;">Welcome Back</h2>
        
        <form action="{{ url_for('login') }}" method="POST">
            <div class="mb-4">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email Address</label>
                <input type="email" name="email" required autocomplete="off" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-primary); outline: none; box-sizing: border-box;">
            </div>
            
            <div class="mb-6">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
                <input type="password" name="password" required autocomplete="off" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-primary); outline: none; box-sizing: border-box;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem;">Sign In</button>
        </form>
        <p style="text-align:center; margin-top:1rem;">
    <a href="{{ url_for('forgot_password') }}" style="color:var(--text-secondary); font-size:0.9rem;">
        Forgot your password?
    </a>
</p>
        <p class="text-center mt-6 text-muted">Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--accent); font-weight: 600;">Sign up</a></p>
    </div>
</div>
{% endblock %}
