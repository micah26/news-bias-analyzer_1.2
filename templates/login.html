{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h3>Welcome Back</h3>
        <p class="text-muted">Sign in to continue to NewsLens</p>
        
        <form method="POST">
            <div class="mb-4">
                <label for="username" class="form-label">Username</label>
                <input 
                    type="text" 
                    class="form-control" 
                    id="username" 
                    name="username" 
                    placeholder="Enter your username"
                    required 
                    autofocus
                >
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input 
                    type="password" 
                    class="form-control" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    required
                >
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>
        
        <div class="text-center mt-4">
            <p class="text-muted">
                Don't have an account? 
                <a href="{{ url_for('register') }}" class="text-primary text-decoration-none fw-bold">Create one</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
