{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card" style="padding: 2.5rem;">
        <h2 style="font-size: 1.8rem; margin-bottom: 1.5rem;">Set New Password</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div style="padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem;
                background: {% if category == 'danger' %}#fff1f2{% else %}#eff6ff{% endif %};
                color: {% if category == 'danger' %}#9f1239{% else %}#1e40af{% endif %};">
              {{ message }}
            </div>
          {% endfor %}
        {% endwith %}

        <form action="{{ url_for('reset_password', token=token) }}" method="POST">
            <div class="mb-4">
                <label style="display:block; margin-bottom:0.5rem; font-weight:500;">New Password</label>
                <input type="password" name="password" required minlength="6"
                    style="width:100%; padding:0.75rem; border:1px solid var(--border-color);
                           border-radius:6px; background:var(--input-bg); color:var(--text-primary);
                           outline:none; box-sizing:border-box;">
            </div>
            <div class="mb-6">
                <label style="display:block; margin-bottom:0.5rem; font-weight:500;">Confirm Password</label>
                <input type="password" name="confirm_password" required minlength="6"
                    style="width:100%; padding:0.75rem; border:1px solid var(--border-color);
                           border-radius:6px; background:var(--input-bg); color:var(--text-primary);
                           outline:none; box-sizing:border-box;">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
