<!-- register.html  -->
{% extends 'base.html' %}
{% block content %}
<div style="max-width: 450px; margin: 4rem auto;">
    <div class="card" style="padding: 2.5rem;">
        <h2 class="text-center mb-6" style="font-size: 2rem;">Create an Account</h2>
        
        <form action="{{ url_for('register') }}" method="POST">
            <div class="mb-4">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Username</label>
                <input type="text" name="username" minlength="3" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-primary); outline: none; box-sizing: border-box;">
            </div>
            
            <div class="mb-4">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email Address</label>
                <input type="email" name="email" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-primary); outline: none; box-sizing: border-box;">
            </div>
            
            <div class="mb-4">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
                <input type="password" name="password" minlength="8" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-primary); outline: none; box-sizing: border-box;">
                <small class="text-muted mt-1 block">Must be at least 8 characters.</small>
            </div>
            
            <div class="mb-6">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Confirm Password</label>
                <input type="password" name="confirm_password" minlength="8" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-primary); outline: none; box-sizing: border-box;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem;">Sign Up</button>
        </form>
        
        <p class="text-center mt-6 text-muted">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--accent); font-weight: 600;">Sign in</a></p>
    </div>
</div>
{% endblock %}
